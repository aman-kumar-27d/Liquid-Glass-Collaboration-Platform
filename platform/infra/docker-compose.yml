version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: liquid-glass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: liquid_glass
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: liquid-glass-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: liquid-glass-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  coturn:
    image: instrumentisto/coturn:latest
    container_name: liquid-glass-coturn
    restart: unless-stopped
    command: -c /etc/coturn/turnserver.conf
    ports:
      - "3478:3478"
      - "3478:3478/udp"
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro

volumes:
  postgres_data:
  minio_data:
